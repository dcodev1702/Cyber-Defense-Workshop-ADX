  <text x="50" y="660" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="2">— TIME ALLOCATION AT A GLANCE</text>

  <!-- Stacked horizontal bar showing relative durations.
       Total: 120 min. Track is 1000px wide starting at x=50, so 1 min ≈ 8.33 px.
       Segment widths: 10→83.33, 15→125, 20→166.67, 35→291.67, 20→166.67, 15→125, 5→41.67 -->
  <g>
