  <rect x="990" y="595" width="50" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1015" y="614" text-anchor="middle" fill="#dbeafe" font-size="12" font-weight="700">5 min</text>

