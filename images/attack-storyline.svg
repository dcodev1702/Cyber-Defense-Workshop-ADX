  <text x="600" y="868" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">Tactic: Credential Access · MITRE techniques: T1552.002 · T1003.001 · T1003.002 · T1555 · T1555.003 · T1558.003</text>
