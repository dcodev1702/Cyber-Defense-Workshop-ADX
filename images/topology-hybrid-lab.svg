<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Outer frame -->
  <rect x="20" y="20" width="1160" height="780" rx="14" fill="#0b1220" stroke="#1f2937" stroke-width="1.5"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">Hybrid Lab Topology</text>
  <text x="600" y="80" text-anchor="middle" fill="#94a3b8" font-size="13">corp.wiesbaden.example · Hybrid Active Directory + Microsoft Entra ID · 20 students querying the ADX Web UI</text>

  <!-- ============ STUDENT / INSTRUCTOR ROW ============ -->
  <g>
    <rect x="50" y="105" width="200" height="68" rx="10" fill="#0b2a4a" stroke="#3b82f6" stroke-width="2"/>
    <text x="150" y="132" text-anchor="middle" fill="#dbeafe" font-size="14" font-weight="700">20 Students</text>
    <text x="150" y="151" text-anchor="middle" fill="#93c5fd" font-size="11">ADX Web UI · MFA</text>
    <text x="150" y="166" text-anchor="middle" fill="#93c5fd" font-size="11">student_lab.kql</text>
  </g>

  <g>
    <rect x="950" y="105" width="200" height="68" rx="10" fill="#0b2a4a" stroke="#3b82f6" stroke-width="2"/>
    <text x="1050" y="132" text-anchor="middle" fill="#dbeafe" font-size="14" font-weight="700">Instructor</text>
    <text x="1050" y="151" text-anchor="middle" fill="#93c5fd" font-size="11">ADX Web UI · slides</text>
    <text x="1050" y="166" text-anchor="middle" fill="#93c5fd" font-size="11">instructor_guide.md</text>
  </g>

  <!-- ============ MICROSOFT ENTRA ID ENCLAVE ============ -->
  <g>
    <rect x="280" y="105" width="640" height="120" rx="12" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 5"/>
    <text x="300" y="128" fill="#cbd5e1" font-size="12" font-weight="600">Microsoft Entra ID — cloud identity plane</text>

    <rect x="295" y="142" width="148" height="68" rx="10" fill="#3a1d05" stroke="#f97316" stroke-width="2"/>
    <text x="369" y="166" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="700">Sign-in Logs</text>
    <text x="369" y="183" text-anchor="middle" fill="#fdba74" font-size="10">SigninLogs</text>
    <text x="369" y="197" text-anchor="middle" fill="#fdba74" font-size="10">EntraIdSignInEvents</text>

    <rect x="453" y="142" width="148" height="68" rx="10" fill="#3a1d05" stroke="#f97316" stroke-width="2"/>
    <text x="527" y="166" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="700">CloudAppEvents</text>
    <text x="527" y="183" text-anchor="middle" fill="#fdba74" font-size="10">OAuth consent</text>
    <text x="527" y="197" text-anchor="middle" fill="#fdba74" font-size="10">session activity</text>

    <rect x="611" y="142" width="148" height="68" rx="10" fill="#3a1d05" stroke="#f97316" stroke-width="2"/>
    <text x="685" y="166" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="700">Microsoft Graph</text>
    <text x="685" y="183" text-anchor="middle" fill="#fdba74" font-size="10">GraphApiAuditEvents</text>
    <text x="685" y="197" text-anchor="middle" fill="#fdba74" font-size="10">MicrosoftGraphActivityLogs</text>

    <rect x="769" y="142" width="148" height="68" rx="10" fill="#3a1d05" stroke="#f97316" stroke-width="2"/>
    <text x="843" y="166" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="700">Audit &amp; Risk</text>
    <text x="843" y="183" text-anchor="middle" fill="#fdba74" font-size="10">AuditLogs</text>
    <text x="843" y="197" text-anchor="middle" fill="#fdba74" font-size="10">AADRiskyUsers</text>
  </g>

  <!-- ============ ON-PREM HYBRID AD ENCLAVE ============ -->
  <g>
    <rect x="50" y="290" width="540" height="240" rx="12" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 5"/>
    <text x="70" y="313" fill="#cbd5e1" font-size="12" font-weight="600">Hybrid AD — corp.wiesbaden.example</text>

    <rect x="76" y="332" width="240" height="86" rx="10" fill="#0b2a4a" stroke="#3b82f6" stroke-width="2"/>
    <text x="196" y="358" text-anchor="middle" fill="#dbeafe" font-size="13" font-weight="700">DC01</text>
    <text x="196" y="378" text-anchor="middle" fill="#93c5fd" font-size="11">10.42.0.10 · MDI sensor</text>
    <text x="196" y="393" text-anchor="middle" fill="#93c5fd" font-size="11">Windows Server 2025</text>
    <text x="196" y="408" text-anchor="middle" fill="#93c5fd" font-size="10">IdentityQueryEvents · IdentityLogonEvents</text>

    <rect x="326" y="332" width="240" height="86" rx="10" fill="#0b2a4a" stroke="#3b82f6" stroke-width="2"/>
    <text x="446" y="358" text-anchor="middle" fill="#dbeafe" font-size="13" font-weight="700">DC02</text>
    <text x="446" y="378" text-anchor="middle" fill="#93c5fd" font-size="11">10.42.0.11 · MDI sensor</text>
    <text x="446" y="393" text-anchor="middle" fill="#93c5fd" font-size="11">Windows Server 2025</text>
    <text x="446" y="408" text-anchor="middle" fill="#93c5fd" font-size="10">IdentityDirectoryEvents</text>

    <rect x="200" y="438" width="240" height="74" rx="10" fill="#0b2a4a" stroke="#3b82f6" stroke-width="2"/>
    <text x="320" y="463" text-anchor="middle" fill="#dbeafe" font-size="13" font-weight="700">AADCONNECT01</text>
    <text x="320" y="482" text-anchor="middle" fill="#93c5fd" font-size="11">10.42.0.20 · Entra Connect</text>
    <text x="320" y="497" text-anchor="middle" fill="#93c5fd" font-size="11">+ MDE telemetry</text>
  </g>

  <!-- ============ ENDPOINT ESTATE ENCLAVE ============ -->
  <g>
    <rect x="610" y="290" width="540" height="240" rx="12" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 5"/>
    <text x="630" y="313" fill="#cbd5e1" font-size="12" font-weight="600">MDE Endpoint Estate</text>

    <rect x="636" y="332" width="240" height="86" rx="10" fill="#0f3a1f" stroke="#22c55e" stroke-width="2"/>
    <text x="756" y="358" text-anchor="middle" fill="#bbf7d0" font-size="13" font-weight="700">10 × Windows 11 25H2</text>
    <text x="756" y="378" text-anchor="middle" fill="#86efac" font-size="11">10.42.10.21 – 10.42.10.30</text>
    <text x="756" y="393" text-anchor="middle" fill="#86efac" font-size="11">WIN11-04 · patient zero</text>
    <text x="756" y="408" text-anchor="middle" fill="#86efac" font-size="10">DeviceProcessEvents · DeviceFileEvents</text>

    <rect x="886" y="332" width="240" height="86" rx="10" fill="#0f3a1f" stroke="#22c55e" stroke-width="2"/>
    <text x="1006" y="358" text-anchor="middle" fill="#bbf7d0" font-size="13" font-weight="700">5 × Ubuntu 22.04</text>
    <text x="1006" y="378" text-anchor="middle" fill="#86efac" font-size="11">10.42.20.31 – 10.42.20.35</text>
    <text x="1006" y="393" text-anchor="middle" fill="#86efac" font-size="11">MDE for Linux</text>
    <text x="1006" y="408" text-anchor="middle" fill="#86efac" font-size="10">DeviceLogonEvents · DeviceNetworkEvents</text>

    <rect x="760" y="438" width="240" height="74" rx="10" fill="#2a1252" stroke="#a855f7" stroke-width="2"/>
    <text x="880" y="463" text-anchor="middle" fill="#e9d5ff" font-size="13" font-weight="700">Defender XDR Alerts</text>
    <text x="880" y="482" text-anchor="middle" fill="#d8b4fe" font-size="11">AlertInfo · AlertEvidence</text>
    <text x="880" y="497" text-anchor="middle" fill="#d8b4fe" font-size="11">cross-product correlation</text>
  </g>

  <!-- ============ ADX SINK ============ -->
  <g>
    <rect x="390" y="650" width="420" height="90" rx="10" fill="#0f172a" stroke="#94a3b8" stroke-width="2"/>
    <text x="600" y="678" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">Azure Data Explorer</text>
    <text x="600" y="700" text-anchor="middle" fill="#cbd5e1" font-size="12">CyberDefenseKqlWorkshop database · 48 tables</text>
    <text x="600" y="720" text-anchor="middle" fill="#94a3b8" font-size="11">Microsoft Learn-derived schemas · JSON ingestion mappings</text>
  </g>

  <!-- ============ EDGES ============ -->
  <!-- Students -> ADX (route around enclaves on the LEFT) -->
  <path d="M 150 173 L 150 600 Q 150 660 210 670 L 390 685" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="35" y="430" fill="#cbd5e1" font-size="11" font-style="italic" transform="rotate(-90 35 430)">KQL queries from students</text>

  <!-- Instructor -> ADX (route around enclaves on the RIGHT) -->
  <path d="M 1050 173 L 1050 600 Q 1050 660 990 670 L 810 685" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1180" y="430" fill="#cbd5e1" font-size="11" font-style="italic" transform="rotate(-90 1180 430)">KQL queries from instructor</text>

  <!-- Entra plane -> ADX (straight down center, between the two on-prem enclaves) -->
  <line x1="600" y1="225" x2="600" y2="650" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowDashed)"/>
  <text x="608" y="265" fill="#64748b" font-size="10" font-style="italic">cloud · sign-in</text>
  <text x="608" y="279" fill="#64748b" font-size="10" font-style="italic">graph telemetry</text>

  <!-- Hybrid AD -> ADX (telemetry, from bottom of left enclave) -->
  <path d="M 400 530 L 400 615 Q 400 650 440 660 L 500 680" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowDashed)"/>
  <text x="305" y="600" fill="#64748b" font-size="10" font-style="italic">identity telemetry</text>

  <!-- Endpoint estate -> ADX (telemetry, from bottom of right enclave) -->
  <path d="M 800 530 L 800 615 Q 800 650 760 660 L 700 680" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowDashed)"/>
  <text x="810" y="600" fill="#64748b" font-size="10" font-style="italic">device + alert telemetry</text>

  <!-- Footer caption -->
  <text x="600" y="775" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">All telemetry is synthetic and pre-staged · scenario starts 2026-04-30T13:00Z</text>
  <text x="600" y="792" text-anchor="middle" fill="#94a3b8" font-size="11">Solid arrows = student / instructor query path · Dashed arrows = telemetry ingestion</text>
</svg>
