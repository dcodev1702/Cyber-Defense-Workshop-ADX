<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 1000" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- Outer frame -->
  <rect x="20" y="20" width="1110" height="960" rx="14" fill="#0b1220" stroke="#1f2937" stroke-width="1.5"/>

  <!-- Title -->
  <text x="575" y="58" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">Credential-Access Playbook on WIN11-04</text>
  <text x="575" y="80" text-anchor="middle" fill="#94a3b8" font-size="12">10 attacker actions across 58 minutes · grouped by credential source · each stage maps to a MITRE ATT&amp;CK technique family</text>

  <!-- ============ STAGE 1: REGISTRY &amp; SAM HIVE (amber) ============ -->
  <!-- Stage band -->
  <rect x="50" y="115" width="1050" height="148" rx="10" fill="#1a1208" stroke="#f59e0b" stroke-width="2"/>
  <!-- Colored left rail -->
  <rect x="50" y="115" width="6" height="148" fill="#f59e0b"/>

  <!-- Stage header -->
  <text x="75" y="140" fill="#fcd34d" font-size="13" font-weight="700">STAGE 1 · Registry &amp; SAM Hive</text>
  <text x="75" y="158" fill="#fbbf24" font-size="11" font-style="italic">On-disk credential stores · Windows password databases</text>

  <!-- Step 1: T+15m -->
  <g>
    <text x="80" y="195" fill="#fcd34d" font-size="12" font-weight="700" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">T+15m</text>
    <rect x="155" y="180" width="380" height="22" rx="4" fill="#0f172a"/>
    <text x="165" y="196" fill="#e2e8f0" font-size="11" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">powershell.exe collect-reg-creds.ps1</text>
    <text x="555" y="196" fill="#cbd5e1" font-size="12">Harvesting credentials saved in registry values</text>
    <!-- MITRE badge -->
    <rect x="970" y="180" width="110" height="22" rx="11" fill="#2a1d05" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="1025" y="196" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700" font-family="ui-monospace, monospace">T1552.002</text>
  </g>

  <!-- Step 2: T+22m -->
  <g>
    <text x="80" y="240" fill="#fcd34d" font-size="12" font-weight="700" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">T+22m</text>
    <rect x="155" y="225" width="380" height="22" rx="4" fill="#0f172a"/>
    <text x="165" y="241" fill="#e2e8f0" font-size="11" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">reg.exe save HKLM\SAM ...</text>
    <text x="555" y="241" fill="#cbd5e1" font-size="12">Dumping the SAM hive (local password hashes)</text>
    <rect x="970" y="225" width="110" height="22" rx="11" fill="#2a1d05" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="1025" y="241" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700" font-family="ui-monospace, monospace">T1003.002</text>
  </g>

  <!-- ============ STAGE 2: BROWSER PASSWORD STORE (cyan) ============ -->
  <rect x="50" y="280" width="1050" height="103" rx="10" fill="#062a30" stroke="#06b6d4" stroke-width="2"/>
  <rect x="50" y="280" width="6" height="103" fill="#06b6d4"/>

  <text x="75" y="305" fill="#67e8f9" font-size="13" font-weight="700">STAGE 2 · Browser Password Store</text>
  <text x="75" y="323" fill="#22d3ee" font-size="11" font-style="italic">Application credential databases · stolen via legitimate Windows utility</text>

  <!-- Step 3: T+27m -->
  <g>
    <text x="80" y="360" fill="#67e8f9" font-size="12" font-weight="700" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">T+27m</text>
    <rect x="155" y="345" width="380" height="22" rx="4" fill="#0f172a"/>
    <text x="165" y="361" fill="#e2e8f0" font-size="11" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">esentutl.exe /y "Chrome\Login Data"</text>
    <text x="555" y="361" fill="#cbd5e1" font-size="12">Copying Chrome's password database while it's locked</text>
    <rect x="970" y="345" width="110" height="22" rx="11" fill="#062a30" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="1025" y="361" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700" font-family="ui-monospace, monospace">T1555.003</text>
  </g>

  <!-- ============ STAGE 3: KERBEROASTING (red) ============ -->
  <rect x="50" y="400" width="1050" height="148" rx="10" fill="#2a0808" stroke="#ef4444" stroke-width="2"/>
  <rect x="50" y="400" width="6" height="148" fill="#ef4444"/>

  <text x="75" y="425" fill="#fca5a5" font-size="13" font-weight="700">STAGE 3 · Kerberoasting</text>
  <text x="75" y="443" fill="#f87171" font-size="11" font-style="italic">Active Directory service-ticket theft · crackable offline · no DC alerts at request time</text>

  <!-- Step 4: T+35m -->
  <g>
    <text x="80" y="480" fill="#fca5a5" font-size="12" font-weight="700" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">T+35m</text>
    <rect x="155" y="465" width="380" height="22" rx="4" fill="#0f172a"/>
    <text x="165" y="481" fill="#e2e8f0" font-size="11" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">Rubeus.exe kerberoast</text>
    <text x="555" y="481" fill="#cbd5e1" font-size="12">Requesting Kerberos service tickets to crack offline</text>
    <rect x="970" y="465" width="110" height="22" rx="11" fill="#2a0808" stroke="#ef4444" stroke-width="1.5"/>
    <text x="1025" y="481" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700" font-family="ui-monospace, monospace">T1558.003</text>
  </g>

  <!-- Step 5: T+42m -->
  <g>
    <text x="80" y="525" fill="#fca5a5" font-size="12" font-weight="700" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">T+42m</text>
    <rect x="155" y="510" width="380" height="22" rx="4" fill="#0f172a"/>
    <text x="165" y="526" fill="#e2e8f0" font-size="11" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">Invoke-Kerberoast (PowerShell Empire)</text>
    <text x="555" y="526" fill="#cbd5e1" font-size="12">Same technique, different tool — testing for blind spots</text>
    <rect x="970" y="510" width="110" height="22" rx="11" fill="#2a0808" stroke="#ef4444" stroke-width="1.5"/>
    <text x="1025" y="526" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700" font-family="ui-monospace, monospace">T1558.003</text>
  </g>

  <!-- ============ STAGE 4: LSASS &amp; OS CREDENTIAL DUMPING (violet) ============ -->
  <rect x="50" y="565" width="1050" height="238" rx="10" fill="#1a0e2e" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="50" y="565" width="6" height="238" fill="#8b5cf6"/>

  <text x="75" y="590" fill="#c4b5fd" font-size="13" font-weight="700">STAGE 4 · LSASS &amp; OS Credential Dumping</text>
  <text x="75" y="608" fill="#a78bfa" font-size="11" font-style="italic">Process memory + system credential databases · the attacker tries multiple tools to bypass detections</text>

  <!-- Step 6: T+50m -->
  <g>
    <text x="80" y="645" fill="#c4b5fd" font-size="12" font-weight="700" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">T+50m</text>
    <rect x="155" y="630" width="380" height="22" rx="4" fill="#0f172a"/>
    <text x="165" y="646" fill="#e2e8f0" font-size="11" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">procdump64.exe -ma lsass.exe</text>
    <text x="555" y="646" fill="#cbd5e1" font-size="12">Dumping LSASS memory to a minidump file for offline parsing</text>
    <rect x="970" y="630" width="110" height="22" rx="11" fill="#1a0e2e" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="1025" y="646" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700" font-family="ui-monospace, monospace">T1003.001</text>
  </g>

  <!-- Step 7: T+56m -->
  <g>
    <text x="80" y="690" fill="#c4b5fd" font-size="12" font-weight="700" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">T+56m</text>
    <rect x="155" y="675" width="380" height="22" rx="4" fill="#0f172a"/>
    <text x="165" y="691" fill="#e2e8f0" font-size="11" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">PwDump7.exe · gsecdump.exe</text>
    <text x="555" y="691" fill="#cbd5e1" font-size="12">More password-dumping tools targeting SAM and LSASS directly</text>
    <rect x="965" y="675" width="120" height="22" rx="11" fill="#1a0e2e" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="1025" y="691" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700" font-family="ui-monospace, monospace">T1003.001/002</text>
  </g>

  <!-- Step 8: T+70m -->
  <g>
    <text x="80" y="735" fill="#c4b5fd" font-size="12" font-weight="700" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">T+70m</text>
    <rect x="155" y="720" width="380" height="22" rx="4" fill="#0f172a"/>
    <text x="165" y="736" fill="#e2e8f0" font-size="11" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">rundll32.exe kiwi.dll logonpasswords</text>
    <text x="555" y="736" fill="#cbd5e1" font-size="12">Mimikatz hidden inside rundll32 to evade name-based detection</text>
    <rect x="970" y="720" width="110" height="22" rx="11" fill="#1a0e2e" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="1025" y="736" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700" font-family="ui-monospace, monospace">T1003.001</text>
  </g>

  <!-- Step 9: T+73m -->
  <g>
    <text x="80" y="780" fill="#c4b5fd" font-size="12" font-weight="700" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">T+73m</text>
    <rect x="155" y="765" width="380" height="22" rx="4" fill="#0f172a"/>
    <text x="165" y="781" fill="#e2e8f0" font-size="11" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">mimikatz.exe "sekurlsa::logonpasswords"</text>
    <text x="555" y="781" fill="#cbd5e1" font-size="12">Mimikatz directly — by now the attacker knows the box is theirs</text>
    <rect x="970" y="765" width="110" height="22" rx="11" fill="#1a0e2e" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="1025" y="781" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700" font-family="ui-monospace, monospace">T1003.001</text>
  </g>

  <!-- ============ STAGE 5: PASSWORD-STORE HARVESTING (pink) ============ -->
  <rect x="50" y="820" width="1050" height="103" rx="10" fill="#2a0a1d" stroke="#ec4899" stroke-width="2"/>
  <rect x="50" y="820" width="6" height="103" fill="#ec4899"/>

  <text x="75" y="845" fill="#f9a8d4" font-size="13" font-weight="700">STAGE 5 · Generic Password-Store Harvesting</text>
  <text x="75" y="863" fill="#f472b6" font-size="11" font-style="italic">All-in-one credential harvester · sweeps every password vault on the system</text>

  <!-- Step 10: T+65m (note: this is technically before stage 4 step 8/9 chronologically but grouped here by family) -->
  <g>
    <text x="80" y="900" fill="#f9a8d4" font-size="12" font-weight="700" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">T+65m</text>
    <rect x="155" y="885" width="380" height="22" rx="4" fill="#0f172a"/>
    <text x="165" y="901" fill="#e2e8f0" font-size="11" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">LaZagne.exe all</text>
    <text x="555" y="901" fill="#cbd5e1" font-size="12">Sweeps every saved password — browsers, mail, Wi-Fi, RDP</text>
    <rect x="970" y="885" width="110" height="22" rx="11" fill="#2a0a1d" stroke="#ec4899" stroke-width="1.5"/>
    <text x="1025" y="901" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="700" font-family="ui-monospace, monospace">T1555</text>
  </g>

  <!-- Footer caption -->
  <text x="575" y="955" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">All steps observed by MDE on WIN11-04 · staged into C:\ProgramData\wrstage · run as victor.alvarez</text>
</svg>
